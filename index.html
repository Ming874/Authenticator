<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Authenticator</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none';">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-color: #f3f4f6;">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
        <div class="lock-shield">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
        </div>
        <h1>Locked</h1>
        <p>Biometric authentication required</p>
        <button id="unlock-btn" class="btn primary-btn">
            <span>Unlock Vault</span>
        </button>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen hidden">
        <header>
            <h1>Vault</h1>
            <div class="header-actions">
                <button id="add-manual-btn" class="icon-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </button>
                <button id="scan-btn" class="icon-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                </button>
            </div>
        </header>
        
        <div id="otp-list" class="otp-container"></div>

        <!-- Manual Entry -->
        <div id="manual-overlay" class="overlay hidden">
            <div class="modal">
                <h2>New Account</h2>
                <div class="input-group">
                    <label>Label</label>
                    <input type="text" id="manual-label" placeholder="e.g. GitHub">
                </div>
                <div class="input-group">
                    <label>Secret Key</label>
                    <input type="text" id="manual-secret" placeholder="Base32 Key">
                </div>
                <div class="modal-actions">
                    <button id="save-manual" class="btn primary-btn">Save Account</button>
                    <button id="cancel-manual" class="btn secondary-btn">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Scanner -->
        <div id="scanner-overlay" class="overlay hidden">
            <video id="video" playsinline></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div class="scan-region"></div>
            <button id="close-scan" class="btn secondary-btn" style="position: absolute; bottom: 40px;">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
