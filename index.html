<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Authenticator</title>
    <meta name="description" content="A secure, private, and client-side TOTP authenticator with biometric protection.">
    
    <!-- Icons & Social Preview -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="me.jpg">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net;">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
        <div class="lock-shield" style="display: flex; justify-content: center; margin-bottom: 24px;">
            <svg width="64" height="64" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="color: #059669;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
        </div>
        <h1 style="text-align: center; margin-bottom: 12px;">Locked</h1>
        <p style="text-align: center; color: #6b7280; margin-bottom: 32px;">Biometric authentication required</p>
        <button id="unlock-btn" class="btn primary-btn">Unlock Vault</button>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen hidden">
        <header>
            <div class="header-left">
                <a href="https://mingchen.dev" class="icon-btn" title="Back to Home">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </a>
                <h1>Vault</h1>
            </div>
            <div class="header-actions">
                <button id="add-manual-btn" class="icon-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"></path></svg>
                </button>
            </div>
        </header>
        
        <div id="otp-list" class="otp-container"></div>

        <!-- Manual Entry Overlay -->
        <div id="manual-overlay" class="overlay hidden">
            <div class="modal">
                <h2 style="margin-bottom: 24px; text-align: center;">New Account</h2>
                <div class="input-group">
                    <label>Label</label>
                    <input type="text" id="manual-label" placeholder="e.g. GitHub">
                </div>
                <div class="input-group">
                    <label>Secret Key</label>
                    <input type="text" id="manual-secret" placeholder="Base32 Key">
                </div>
                <div class="modal-actions" style="display: flex; flex-direction: column; gap: 12px; margin-top: 32px;">
                    <button id="save-manual" class="btn primary-btn">Save Account</button>
                    <button id="cancel-manual" class="btn secondary-btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
