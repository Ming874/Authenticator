<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Authenticator</title>
    <meta name="description" content="A secure, private, and client-side TOTP authenticator with biometric protection.">
    
    <!-- Icons & Social Preview -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta property="og:title" content="Secure Authenticator">
    <meta property="og:description" content="Client-side TOTP authenticator with biometric protection.">
    <meta property="og:image" content="me.jpg">
    <meta property="og:type" content="website">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none';">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-color: #f3f4f6;">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
        <div class="lock-shield">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
        </div>
        <h1>Locked</h1>
        <p>Biometric authentication required</p>
        <button id="unlock-btn" class="btn primary-btn">
            <span>Unlock Vault</span>
        </button>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen hidden">
        <header>
            <div class="header-left">
                <a href="https://mingchen.dev" class="icon-btn" title="Back to Home">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </a>
                <h1>Vault</h1>
            </div>
            <div class="header-actions">
                <button id="add-manual-btn" class="icon-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </button>
            </div>
        </header>
        
        <div id="otp-list" class="otp-container"></div>

        <!-- Manual Entry -->
        <div id="manual-overlay" class="overlay hidden">
            <div class="modal">
                <h2>New Account</h2>
                <div class="input-group">
                    <label>Label</label>
                    <input type="text" id="manual-label" placeholder="e.g. GitHub">
                </div>
                <div class="input-group">
                    <label>Secret Key</label>
                    <input type="text" id="manual-secret" placeholder="Base32 Key">
                </div>
                <div class="modal-actions">
                    <button id="save-manual" class="btn primary-btn">Save Account</button>
                    <button id="cancel-manual" class="btn secondary-btn">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Edit Entry -->
        <div id="edit-overlay" class="overlay hidden">
            <div class="modal">
                <h2>Edit Account</h2>
                <div class="input-group">
                    <label>Label</label>
                    <input type="text" id="edit-label" placeholder="e.g. GitHub">
                </div>
                <input type="hidden" id="edit-id">
                <div class="modal-actions">
                    <button id="save-edit" class="btn primary-btn">Update Name</button>
                    <button id="cancel-edit" class="btn secondary-btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
